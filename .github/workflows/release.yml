name: Package addon

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  ADDON_NAME: EllesmereUISweepingStrikes

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build addon zip
        run: |
          mkdir -p "dist/$ADDON_NAME"

          rsync -a \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude="dist/" \
            --exclude="*.md" \
            ./ "dist/$ADDON_NAME/"

          cd dist
          zip -r "${ADDON_NAME}-${GITHUB_REF_NAME}.zip" "$ADDON_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
